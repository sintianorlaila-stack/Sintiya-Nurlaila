    <style>
        /* Pengaturan Dasar */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #fcf8f5; /* Warna background krem lembut */
            color: #333;
            line-height: 1.6;
        }

        /* Navigasi Tema Mahogany */
        nav {
            background-color: #4e1609; /* Warna Mahogany Tua */
            padding: 1rem;
            position: sticky;
            top: 0;
            display: flex;
            justify-content: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        nav a {
            color: #d4af37; /* Warna Emas untuk kontras */
            text-decoration: none;
            margin: 0 15px;
            font-weight: 600;
            transition: color 0.3s;
        }

        nav a:hover {
            color: #ffffff;
        }

        /* Hero Section */
        .hero {
            background: linear-gradient(rgba(78, 22, 9, 0.8), rgba(78, 22, 9, 0.8)), 
                        url('https://images.unsplash.com/photo-1533090161767-e6ffed986c88?ixlib=rb-1.2.1&auto=format&fit=crop&w=1350&q=80');
            background-size: cover;
            background-position: center;
            height: 400px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            text-align: center;
            padding: 20px;
        }

        .hero h1 {
            font-size: 3rem;
            margin-bottom: 10px;
            color: #f5e6d3;
        }

        /* Konten Utama */
        .container {
            max-width: 800px;
            margin: 40px auto;
            padding: 20px;
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 15px rgba(0,0,0,0.05);
            border-left: 10px solid #6b2414; /* Aksen kayu di pinggir */
        }

        footer {
            text-align: center;
            padding: 20px;
            background-color: #4e1609;
            color: #f5e6d3;
            margin-top: 50px;
            font-size: 0.9rem;
        }
    </style>
