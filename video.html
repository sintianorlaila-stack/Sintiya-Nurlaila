<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Gallery - Mahogany Theme</title>
    <style>
        /* Pengaturan Dasar */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #fcf8f5;
            color: #333;
        }

        /* Navigasi */
        nav {
            background-color: #4e1609;
            padding: 1rem;
            position: sticky;
            top: 0;
            display: flex;
            justify-content: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            z-index: 1000;
        }

        nav a {
            color: #d4af37;
            text-decoration: none;
            margin: 0 15px;
            font-weight: 600;
            transition: 0.3s;
        }

        nav a:hover { color: #ffffff; }

        /* Header */
        .header-section {
            text-align: center;
            padding: 40px 20px;
            background-color: #6b2414;
            color: #f5e6d3;
        }

        /* Container Video */
        .container {
            max-width: 900px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .video-card {
            background: white;
            border: 10px solid #4e1609; /* Bingkai Mahogany Tebal */
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            margin-bottom: 30px;
        }

        .video-wrapper {
            position: relative;
            padding-bottom: 56.25%; /* Rasio 16:9 */
            height: 0;
        }

        .video-wrapper iframe, 
        .video-wrapper video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        .video-info {
            padding: 20px;
            background-color: #f5e6d3;
            border-top: 2px solid #4e1609;
        }

        .video-info h2 {
            color: #4e1609;
            margin-bottom: 10px;
        }

        footer {
            text-align: center;
            padding: 20px;
            background-color: #4e1609;
            color: #f5e6d3;
            margin-top: 50px;
        }
    </style>
</head>
<body>

    <nav>
        <a href="index.html">Home</a>
        <a href="biodata.html">Biodata</a>
        <a href="gallery.html">Gallery</a>
        <a href="video.html">Video</a>
    </nav>

    <div class="header-section">
        <h1>Video Dokumentasi Sintiya</h1>
        <p></p>
    </div>

    <div class="container">
        
        <div class="video-card">
            <div class="video-wrapper">
                <iframe src="Kamar Kost.mp4"></iframe>
            </div>
            <div class="video-info">
                <h2> </h2>
                <p></p>
            </div>
        </div>

    </div>

    <footer>
    </footer>

</body>
</html>
