<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biodata - Mahogany Theme</title>
    <style>
        /* Pengaturan Dasar - Konsisten dengan Index */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #fcf8f5;
            color: #333;
            line-height: 1.6;
        }

        /* Navigasi */
        nav {
            background-color: #4e1609;
            padding: 1rem;
            position: sticky;
            top: 0;
            display: flex;
            justify-content: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            z-index: 1000;
        }

        nav a {
            color: #d4af37;
            text-decoration: none;
            margin: 0 15px;
            font-weight: 600;
            transition: 0.3s;
        }

        nav a:hover {
            color: #ffffff;
        }

        /* Container Biodata */
        .container {
            max-width: 700px;
            margin: 50px auto;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            border-top: 8px solid #6b2414;
        }

        /* Foto Profil */
        .profile-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .profile-img {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            object-fit: cover;
            border: 5px solid #4e1609;
            padding: 5px;
            background-color: #d4af37;
        }

        h1 {
            color: #4e1609;
            margin-top: 15px;
        }

        /* Tabel Biodata */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        table tr {
            border-bottom: 1px solid #eee;
        }

        table td {
            padding: 12px 15px;
        }

        .label {
            font-weight: bold;
            color: #6b2414;
            width: 30%;
        }

        footer {
            text-align: center;
            padding: 20px;
            background-color: #4e1609;
            color: #f5e6d3;
            margin-top: 50px;
        }
    </style>
</head>
<body>

    <nav>
        <a href="index.html">Home</a>
        <a href="biodata.html">Biodata</a>
        <a href="gallery.html">Gallery</a>
        <a href="video.html">Video</a>
    </nav>

    <div class="container">
        <div class="profile-header">
            <img src="https://via.placeholder.com/150" alt="Foto Profil" class="profile-img">
            <h1>Biodata Diri</h1>
            <p>Mahasiswa Informatika</p>
        </div>

        <table>
            <tr>
                <td class="label">Nama Lengkap</td>
                <td>: [Nama Anda]</td>
            </tr>
            <tr>
                <td class="label">NIM</td>
                <td>: [NIM Anda]</td>
            </tr>
            <tr>
                <td class="label">Jurusan</td>
                <td>: Teknik Informatika</td>
            </tr>
            <tr>
                <td class="label">Fakultas</td>
                <td>: Ilmu Komputer</td>
            </tr>
            <tr>
                <td class="label">Hobi</td>
                <td>: Coding & Desain</td>
            </tr>
            <tr>
                <td class="label">Email</td>
                <td>: email@contoh.com</td>
            </tr>
        </table>
    </div>

    <footer>
        &copy; 2024 Tugas Web Programming - Tema Mahogany
    </footer>

</body>
</html>
