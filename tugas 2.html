<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulir Pendataan Terintegrasi</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; background: #fff; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h2 { border-bottom: 2px solid #007bff; padding-bottom: 10px; margin-top: 30px; color: #333; }
        h2:first-child { margin-top: 0; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #555; }
        input[type="text"], input[type="date"], input[type="tel"], input[type="email"], input[type="number"], textarea {
            width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box;
        }
        /* Styling untuk Radio Button menjadi bentuk Button */
        .radio-toolbar { display: flex; gap: 10px; }
        .radio-toolbar input[type="radio"] { display: none; }
        .radio-toolbar label {
            display: inline-block; background-color: #e9ecef; padding: 10px 20px; font-family: sans-serif, Arial; font-size: 14px;
            border: 1px solid #ccc; border-radius: 4px; cursor: pointer; flex: 1; text-align: center; font-weight: normal;
        }
        .radio-toolbar input[type="radio"]:checked + label { background-color: #007bff; color: white; border-color: #007bff; font-weight: bold; }
        
        button[type="submit"] {
            background-color: #28a745; color: white; padding: 12px 20px; border: none; border-radius: 4px;
            cursor: pointer; width: 100%; font-size: 16px; font-weight: bold; margin-top: 20px;
        }
        button[type="submit"]:hover { background-color: #218838; }
        .hidden { display: none; }
        #message { margin-top: 15px; padding: 10px; border-radius: 4px; display: none; text-align: center; }
        .success { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
    </style>
</head>
<body>

<div class="container">
    <form id="dataForm">
        <h2>Data Demografi</h2>
        
        <div class="form-group">
            <label>Nama Pengguna</label>
            <input type="text" name="nama" required placeholder="Masukkan nama lengkap">
        </div>
        
        <div class="form-group">
            <label>Tanggal Lahir</label>
            <input type="date" name="tanggal_lahir" required>
        </div>
        
        <div class="form-group">
            <label>Alamat</label>
            <textarea name="alamat" rows="3" required placeholder="Alamat lengkap"></textarea>
        </div>
        
        <div class="form-group">
            <label>No Telepon</label>
            <input type="tel" name="telepon" required placeholder="08123456789">
        </div>
        
        <div class="form-group">
            <label>Email</label>
            <input type="email" name="email" required placeholder="email@contoh.com">
        </div>
        
        <div class="form-group">
            <label>Pendidikan (Pilih atau Ketik)</label>
            <input list="pendidikan-list" name="pendidikan" required placeholder="Cari/Pilih Pendidikan">
            <datalist id="pendidikan-list">
                <option value="SD">
                <option value="SMP">
                <option value="SMA/SMK">
                <option value="D3 / Diploma">
                <option value="S1 / Sarjana">
                <option value="S2 / Magister">
                <option value="S3 / Doktor">
            </datalist>
        </div>

        <h2>Data Bank</h2>
        
        <div class="form-group">
            <label>Nama Bank (Pilih atau Ketik)</label>
            <input list="bank-list" name="nama_bank" required placeholder="Cari/Pilih Bank">
            <datalist id="bank-list">
                <option value="BCA">
                <option value="Mandiri">
                <option value="BNI">
                <option value="BRI">
                <option value="BSI">
                <option value="CIMB Niaga">
                <option value="Bank Jago">
                <option value="SeaBank">
            </datalist>
        </div>
        
        <div class="form-group">
            <label>Nomor Rekening</label>
            <input type="number" name="no_rekening" required placeholder="Masukkan nomor rekening">
        </div>

        <h2>Data Transaksi Keuangan</h2>
        
        <div class="form-group">
            <label>Tanggal Transaksi</label>
            <input type="date" name="tanggal_transaksi" required>
        </div>
        
        <div class="form-group">
            <label>Uraian Transaksi</label>
            <input type="text" name="uraian" required placeholder="Contoh: Pembelian alat tulis">
        </div>
        
        <div class="form-group">
            <label>Jenis Transaksi</label>
            <div class="radio-toolbar">
                <input type="radio" id="radioDebit" name="jenis_transaksi" value="Debet" checked onchange="toggleNominal()">
                <label for="radioDebit">Debet (Uang Masuk)</label>

                <input type="radio" id="radioKredit" name="jenis_transaksi" value="Kredit" onchange="toggleNominal()">
                <label for="radioKredit">Kredit (Uang Keluar)</label>
            </div>
        </div>

        <div class="form-group" id="groupDebet">
            <label>Nominal Debet (Rp)</label>
            <input type="number" id="inputDebet" name="debet" placeholder="0">
        </div>

        <div class="form-group hidden" id="groupKredit">
            <label>Nominal Kredit (Rp)</label>
            <input type="number" id="inputKredit" name="kredit" placeholder="0">
        </div>

        <button type="submit" id="submitBtn">Kirim Data</button>
        <div id="message"></div>
    </form>
</div>

<script>
    // Logika untuk menampilkan input debet atau kredit berdasarkan tombol yang dipilih
    function toggleNominal() {
        const jenis = document.querySelector('input[name="jenis_transaksi"]:checked').value;
        const groupDebet = document.getElementById('groupDebet');
        const groupKredit = document.getElementById('groupKredit');
        const inputDebet = document.getElementById('inputDebet');
        const inputKredit = document.getElementById('inputKredit');

        if (jenis === 'Debet') {
            groupDebet.classList.remove('hidden');
            groupKredit.classList.add('hidden');
            inputKredit.value = ""; // Kosongkan field yg tidak aktif
            inputDebet.required = true;
            inputKredit.required = false;
        } else {
            groupKredit.classList.remove('hidden');
            groupDebet.classList.add('hidden');
            inputDebet.value = ""; // Kosongkan field yg tidak aktif
            inputKredit.required = true;
            inputDebet.required = false;
        }
    }

    // Inisialisasi awal
    toggleNominal();

    // Logika Pengiriman Form ke Google Sheets
    const form = document.getElementById('dataForm');
    const submitBtn = document.getElementById('submitBtn');
    const messageDiv = document.getElementById('message');

    // === GANTI URL DI BAWAH DENGAN WEB APP URL ANDA ===
    const scriptURL = 'https://script.google.com/macros/s/AKfycbwVa3Xb7Ihmh-MloQ1TtUDzCxrtpuuAnqqQJiHm9eKnOs2GxlYMkjpvf8Zj4qJgnKYC4Q/exec'; 

    form.addEventListener('submit', e => {
        e.preventDefault();
        submitBtn.disabled = true;
        submitBtn.innerText = 'Mengirim...';
        messageDiv.style.display = 'none';

        const formData = new FormData(form);

        fetch(scriptURL, { method: 'POST', body: formData })
            .then(response => {
                messageDiv.innerText = 'Data berhasil disimpan!';
                messageDiv.className = 'success';
                messageDiv.style.display = 'block';
                form.reset(); // Kosongkan form
                toggleNominal(); // Reset tampilan input nominal
                submitBtn.disabled = false;
                submitBtn.innerText = 'Kirim Data';
            })
            .catch(error => {
                messageDiv.innerText = 'Terjadi kesalahan. Data gagal dikirim.';
                messageDiv.className = 'error';
                messageDiv.style.display = 'block';
                submitBtn.disabled = false;
                submitBtn.innerText = 'Kirim Data';
                console.error('Error!', error.message);
            });
    });
</script>

</body>
</html>
